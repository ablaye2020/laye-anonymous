<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Envoyer</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 30px 25px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        /* IMAGE EN TÊTE */
        .header-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .header-image .big-emoji {
            font-size: 48px;
            display: block;
        }
        .header-image .title {
            color: white;
            font-size: 18px;
            font-weight: 800;
            margin-top: 4px;
        }
        .header-image .sub {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        .back {
            display: block;
            text-align: left;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .back:hover {
            color: #1a1a1a;
        }

        .pseudo-display {
            background: #f2f2f7;
            border-radius: 30px;
            padding: 14px 20px;
            margin: 15px 0;
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .pseudo-display span {
            color: #ff6b6b;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #f2f2f7;
            border: 2px solid transparent;
            border-radius: 24px;
            padding: 16px 18px;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: 0.2s;
            line-height: 1.6;
            color: #1a1a1a;
        }
        textarea:focus {
            border-color: #ff6b6b;
            background: white;
        }
        textarea::placeholder {
            color: #bbb;
        }

        .btn-send {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-send:active {
            transform: scale(0.97);
        }
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            color: #bbb;
            font-size: 14px;
            margin-top: 15px;
            min-height: 22px;
        }
        #status.success {
            color: #4ade80;
        }
        #status.error {
            color: #ff6b6b;
        }

        .footer {
            color: #ddd;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer span {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" onclick="history.back()">← Retour</a>

        <!-- IMAGE BANNIÈRE -->
        <div class="header-image">
            <span class="big-emoji">💬</span>
            <span class="title">envoie-moi des messages anonymes !</span>
            <span class="sub">Khalé yi kone da nio teudie na niou ni ❤️😍😍</span>
        </div>

        <div class="pseudo-display">
            @<span id="pseudoDisplay">pseudo</span>
        </div>

        <textarea id="messageInput" placeholder="Écris ton message ici..."></textarea>

        <button class="btn-send" onclick="envoyerMessage()">📨 Envoyer anonymement</button>

        <div id="status"></div>
        <div class="footer">🔒 100% anonyme • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');

        if (pseudo) {
            document.getElementById('pseudoDisplay').textContent = pseudo;
        } else {
            document.getElementById('status').textContent = '❌ Lien invalide';
            document.getElementById('status').className = 'error';
        }

        function envoyerMessage() {
            const contenu = document.getElementById('messageInput').value.trim();
            const statusEl = document.getElementById('status');

            if (!contenu) {
                alert('📝 Écris un message !');
                return;
            }
            if (contenu.length < 2) {
                alert('📝 Message trop court (min. 2 caractères)');
                return;
            }
            if (!pseudo) {
                alert('❌ Erreur : pseudo manquant');
                return;
            }

            statusEl.textContent = '⏳ Envoi en cours...';
            statusEl.className = '';
            document.querySelector('.btn-send').disabled = true;

            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            const newMessageRef = messagesRef.push();

            newMessageRef.set({
                contenu: contenu,
                date: Date.now()
            }).then(() => {
                database.ref('boites/' + pseudo + '/nbMessages').transaction((current) => {
                    return (current || 0) + 1;
                });
                statusEl.textContent = '✅ Message envoyé avec succès !';
                statusEl.className = 'success';
                document.getElementById('messageInput').value = '';
                document.querySelector('.btn-send').disabled = false;
                setTimeout(() => {
                    statusEl.textContent = '';
                    statusEl.className = '';
                }, 3000);
            }).catch((error) => {
                statusEl.textContent = '❌ ' + error.message;
                statusEl.className = 'error';
                document.querySelector('.btn-send').disabled = false;
            });
        }
    </script>
</body>
</html>
