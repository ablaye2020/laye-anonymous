<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Envoyer</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #141414;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a2a2a;
            text-align: center;
        }
        .back {
            color: #555;
            font-size: 14px;
            display: block;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
        }
        .back:hover { color: #aaa; }
        .logo h2 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
        }
        .logo p {
            color: #555;
            font-size: 14px;
        }
        .pseudo-display {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #2a2a2a;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        textarea {
            width: 100%;
            height: 140px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 16px;
            color: #eee;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: 0.3s;
        }
        textarea:focus { border-color: #ff6b6b; }
        textarea::placeholder { color: #444; }
        .btn-send {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.02); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { color: #444; font-size: 13px; margin-top: 15px; }
        .footer { color: #222; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" onclick="history.back()">← Retour</a>
        <div class="logo">
            <h2>✉️ Message anonyme</h2>
            <p>Pose ta question en toute liberté</p>
        </div>

        <div class="pseudo-display" id="pseudoDisplay">@PSEUDO</div>

        <textarea id="messageInput" placeholder="Écris ton message ici..."></textarea>

        <button class="btn-send" onclick="envoyerMessage()">📨 Envoyer anonymement</button>

        <div id="status"></div>
        <div class="footer">🔒 100% anonyme</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');

        if (pseudo) {
            document.getElementById('pseudoDisplay').textContent = '@' + pseudo;
        } else {
            document.getElementById('status').textContent = '❌ Lien invalide';
        }

        function envoyerMessage() {
            const contenu = document.getElementById('messageInput').value.trim();
            
            if (!contenu) {
                alert('📝 Écris un message !');
                return;
            }
            if (contenu.length < 2) {
                alert('📝 Message trop court');
                return;
            }
            if (!pseudo) {
                alert('❌ Erreur');
                return;
            }

            document.getElementById('status').textContent = '⏳ Envoi...';
            document.querySelector('.btn-send').disabled = true;

            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            const newMessageRef = messagesRef.push();

            newMessageRef.set({
                contenu: contenu,
                date: Date.now()
            }).then(() => {
                database.ref('boites/' + pseudo + '/nbMessages').transaction((current) => {
                    return (current || 0) + 1;
                });
                document.getElementById('status').textContent = '✅ Message envoyé !';
                document.getElementById('messageInput').value = '';
                document.querySelector('.btn-send').disabled = false;
                setTimeout(() => {
                    document.getElementById('status').textContent = '';
                }, 3000);
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
                document.querySelector('.btn-send').disabled = false;
            });
        }
    </script>
</body>
</html>
