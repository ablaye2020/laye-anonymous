<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQA - Ask Anything</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #141414;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a2a2a;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #fff;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo h1 span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }
        .card .emoji {
            font-size: 50px;
            display: block;
            margin-bottom: 8px;
        }
        .card h2 {
            color: #fff;
            font-size: 20px;
        }
        .card p {
            color: #777;
            font-size: 14px;
            margin-top: 4px;
        }

        .input-pseudo {
            display: flex;
            gap: 10px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 6px;
            border: 1px solid #2a2a2a;
            margin-bottom: 15px;
        }
        .input-pseudo input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 12px 16px;
            font-size: 16px;
            outline: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-pseudo input::placeholder {
            color: #333;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }
        .input-pseudo .prefix {
            color: #555;
            font-size: 14px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-weight: 600;
        }
        .input-pseudo button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .input-pseudo button:hover {
            transform: scale(1.03);
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: #888;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #222;
            color: #fff;
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 15px;
        }
        .footer {
            text-align: center;
            color: #333;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer span {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Ask<span>Me</span></h1>
            <p>Pose des questions anonymement</p>
        </div>

        <div class="card">
            <span class="emoji">🎯</span>
            <h2>Crée ta boîte</h2>
            <p>Choisis ton pseudo et reçois des messages</p>
        </div>

        <div class="input-pseudo">
            <span class="prefix">🔗 /</span>
            <input type="text" id="pseudoInput" placeholder="TONPSEUDO" maxlength="20">
            <button onclick="creerBoite()">Créer</button>
        </div>

        <button class="btn-secondary" onclick="voirBoite()">📥 Voir mes messages</button>

        <div id="status">Chargement...</div>
        <div class="footer">🔒 100% anonyme • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = null;

        // Vérifier si un pseudo est déjà enregistré
        const savedPseudo = localStorage.getItem('monPseudo');
        if (savedPseudo) {
            document.getElementById('pseudoInput').value = savedPseudo;
        }

        firebase.auth().signInAnonymously()
            .then((userCredential) => {
                currentUser = userCredential.user;
                document.getElementById('status').textContent = '✅ Connecté';
            })
            .catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });

        function creerBoite() {
            if (!currentUser) {
                alert('⏳ Attends la connexion...');
                return;
            }

            let pseudo = document.getElementById('pseudoInput').value.trim().toUpperCase();
            if (!pseudo) {
                alert('📝 Choisis un pseudo !');
                return;
            }
            // Nettoyer le pseudo
            pseudo = pseudo.replace(/[^A-Z0-9]/g, '');
            if (pseudo.length < 3) {
                alert('📝 Minimum 3 caractères');
                return;
            }

            document.getElementById('status').textContent = '⏳ Création...';

            // Vérifier si le pseudo existe déjà
            database.ref('pseudos/' + pseudo).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    // Le pseudo existe déjà, vérifier si c'est le nôtre
                    const data = snapshot.val();
                    if (data.proprietaire === currentUser.uid) {
                        // C'est notre boîte, on y va
                        localStorage.setItem('monPseudo', pseudo);
                        window.location.href = 'recevoir.html?pseudo=' + pseudo;
                    } else {
                        alert('❌ Ce pseudo est déjà pris !');
                        document.getElementById('status').textContent = '❌ Pseudo indisponible';
                    }
                } else {
                    // Créer la boîte
                    database.ref('boites/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now(),
                        nbMessages: 0
                    });
                    // Enregistrer le pseudo
                    database.ref('pseudos/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now()
                    }).then(() => {
                        localStorage.setItem('monPseudo', pseudo);
                        document.getElementById('status').textContent = '✅ Boîte créée !';
                        window.location.href = 'recevoir.html?pseudo=' + pseudo;
                    }).catch((error) => {
                        document.getElementById('status').textContent = '❌ ' + error.message;
                    });
                }
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function voirBoite() {
            const pseudo = localStorage.getItem('monPseudo');
            if (pseudo) {
                window.location.href = 'recevoir.html?pseudo=' + pseudo;
            } else {
                alert('❌ Crée d\'abord une boîte !');
            }
        }
    </script>
</body>
</html>
