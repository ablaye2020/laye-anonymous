<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Messages</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 20%, rgba(255, 107, 107, 0.08), transparent 50%),
                        radial-gradient(circle at 30% 80%, rgba(238, 90, 36, 0.05), transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 25px 0;
        }
        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header h1 .gradient {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-actions button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
            color: #888;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .header-actions button:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            transform: translateY(-1px);
        }

        .share-box {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .share-box .label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .share-box .link-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 6px 8px 6px 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .share-box .link-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 14px;
            outline: none;
            padding: 10px 0;
            font-family: inherit;
        }
        .share-box .link-row button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .share-box .link-row button:hover {
            transform: scale(1.05);
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .share-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .share-buttons button:hover {
            transform: translateY(-2px);
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-wa:hover {
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }
        .btn-ig {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
        }
        .btn-ig:hover {
            box-shadow: 0 10px 30px rgba(220, 39, 67, 0.3);
        }
        .btn-copy {
            background: rgba(255,255,255,0.08);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .btn-copy:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .stats .stat {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .stats .stat .number {
            color: #fff;
            font-size: 30px;
            font-weight: 800;
        }
        .stats .stat .number .gradient {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat .label {
            color: #555;
            font-size: 11px;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }
        .message-card {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 18px 20px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .message-card:hover {
            border-color: rgba(255,107,107,0.15);
            transform: translateX(4px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-card .msg {
            color: #eee;
            font-size: 16px;
            line-height: 1.6;
        }
        .message-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .message-card .date {
            color: #444;
            font-size: 11px;
        }
        .message-card .badge {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            font-size: 10px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state .emoji {
            font-size: 72px;
            display: block;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .empty-state h3 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }
        .empty-state p {
            color: #555;
            font-size: 14px;
            margin-top: 5px;
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin: 10px 0 20px;
        }
        #status.loaded {
            color: #4ade80;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .btn-new {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            color: #666;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            backdrop-filter: blur(10px);
        }
        .btn-new:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        /* Indicateur de notification sonore */
        .sound-indicator {
            display: inline-block;
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            animation: blink 0.8s ease-in-out infinite alternate;
        }
        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ask<span class="gradient">Me</span></h1>
            <div class="header-actions">
                <button onclick="rafraichir()">🔄</button>
                <button onclick="supprimerMessages()">🗑️</button>
            </div>
        </div>

        <div class="share-box">
            <div class="label">📤 Partager ton lien</div>
            <div class="link-row">
                <input type="text" id="lienPartage" readonly>
                <button onclick="copierLien()">Copier</button>
            </div>
            <div class="share-buttons">
                <button class="btn-wa" onclick="partagerWhatsApp()">💬 WhatsApp</button>
                <button class="btn-ig" onclick="partagerInstagram()">📸 Instagram</button>
                <button class="btn-copy" onclick="copierLien()">📋 Copier</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="number"><span class="gradient" id="msgCount">0</span></div>
                <div class="label">Reçus</div>
            </div>
            <div class="stat">
                <div class="number"><span class="gradient" id="unreadCount">0</span></div>
                <div class="label">Non lus</div>
            </div>
        </div>

        <div id="status">⏳ Connexion...</div>

        <div class="message-list" id="messagesContainer"></div>

        <button class="btn-new" onclick="creerNouvelleBoite()">🔄 Créer une nouvelle boîte</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const boiteId = params.get('id');
        let currentUser = null;
        let messagesData = [];
        let ancienNombreMessages = 0;

        const lienComplet = window.location.origin + '/boite.html?id=' + boiteId;

        if (boiteId) {
            document.getElementById('lienPartage').value = lienComplet;
        }

        // 🔔 FONCTION SON DE NOTIFICATION
        function jouerSonNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Pop 1
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.frequency.value = 880;
                osc1.type = 'sine';
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc1.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.15);

                // Ding 2
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.1);
                }, 100);

            } catch (e) {
                console.log('🔇 Son non supporté');
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                const el = document.getElementById('status');
                el.innerHTML = '<span class="pulse-dot"></span>Connecté';
                el.className = 'loaded';
                if (boiteId) {
                    verifierProprietaire(boiteId);
                } else {
                    document.getElementById('status').textContent = '❌ Aucune boîte';
                }
            } else {
                firebase.auth().signInAnonymously();
            }
        });

        function verifierProprietaire(boiteId) {
            database.ref('boites/' + boiteId).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('status').textContent = '❌ Boîte introuvable';
                    return;
                }
                if (data.proprietaire !== currentUser.uid) {
                    document.getElementById('status').textContent = '🔒 Accès refusé';
                    return;
                }
                chargerMessages(boiteId);
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function chargerMessages(boiteId) {
            const messagesRef = database.ref('boites/' + boiteId + '/messages');
            messagesRef.on('value', (snapshot) => {
                const container = document.getElementById('messagesContainer');
                const data = snapshot.val();
                const countEl = document.getElementById('msgCount');

                if (!data) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span class="emoji">🕊️</span>
                            <h3>Aucun message reçu</h3>
                            <p>Partage ton lien pour recevoir des messages anonymes !</p>
                        </div>
                    `;
                    countEl.textContent = '0';
                    document.getElementById('unreadCount').textContent = '0';
                    document.getElementById('status').textContent = '✅ Prêt';
                    ancienNombreMessages = 0;
                    return;
                }

                messagesData = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).sort((a, b) => b.date - a.date);

                const nouveauNombre = messagesData.length;

                // 🎵 JOUER LE SON SI NOUVEAU MESSAGE
                if (nouveauNombre > ancienNombreMessages && ancienNombreMessages > 0) {
                    jouerSonNotification();
                    // Afficher un petit indicateur visuel
                    document.getElementById('status').innerHTML = '🔔 <span style="color:#ff6b6b;">Nouveau message reçu !</span>';
                    setTimeout(() => {
                        document.getElementById('status').innerHTML = '<span class="pulse-dot"></span>Connecté';
                    }, 2000);
                }

                ancienNombreMessages = nouveauNombre;

                countEl.textContent = nouveauNombre;
                document.getElementById('unreadCount').textContent = nouveauNombre;

                let html = '';
                const emojis = ['❤️', '😍', '🔥', '👀', '💯', '✨', '🌟', '🎯'];
                messagesData.forEach((msg, index) => {
                    const date = msg.date ? new Date(msg.date).toLocaleString('fr-FR') : 'Date inconnue';
                    const emoji = emojis[index % emojis.length];
                    html += `
                        <div class="message-card">
                            <div class="msg">${escapeHtml(msg.contenu)}</div>
                            <div class="meta">
                                <span class="date">📅 ${date}</span>
                                <span class="badge">${emoji} Anonyme</span>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                document.getElementById('status').textContent = `✅ ${messagesData.length} message${messagesData.length > 1 ? 's' : ''}`;
            }, (error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copierLien() {
            const input = document.getElementById('lienPartage');
            input.select();
            document.execCommand('copy');
            alert('✅ Lien copié !');
        }

        function partagerWhatsApp() {
            if (!boiteId) return;
            const url = window.location.origin + '/boite.html?id=' + boiteId;
            const msg = encodeURIComponent('👋 Pose-moi une question anonymement ! 🔗 ' + url);
            window.open('https://wa.me/?text=' + msg, '_blank');
        }

        function partagerInstagram() {
            if (!boiteId) return;
            const url = window.location.origin + '/boite.html?id=' + boiteId;
            copierLien();
            alert('📸 Lien copié ! Colle-le dans ta story Instagram 📲');
            if (navigator.share) {
                navigator.share({
                    text: 'Pose-moi une question anonymement ! 🔗 ' + url,
                }).catch(() => {});
            }
        }

        function rafraichir() {
            location.reload();
        }

        function supprimerMessages() {
            if (!confirm('⚠️ Supprimer tous les messages ?')) return;
            if (!boiteId) return;
            database.ref('boites/' + boiteId + '/messages').remove()
                .then(() => {
                    database.ref('boites/' + boiteId + '/nbMessages').set(0);
                    alert('✅ Messages supprimés');
                })
                .catch((error) => {
                    alert('❌ ' + error.message);
                });
        }

        function creerNouvelleBoite() {
            if (!currentUser) {
                alert('⏳ Attends la connexion...');
                return;
            }
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            database.ref('boites/' + id).set({
                proprietaire: currentUser.uid,
                dateCreation: Date.now(),
                nbMessages: 0
            }).then(() => {
                localStorage.setItem('maBoite', id);
                alert('✅ Nouvelle boîte créée !');
                window.location.href = 'recevoir.html?id=' + id;
            }).catch((error) => {
                alert('❌ ' + error.message);
            });
        }
    </script>
</body>
</html>
